<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Recovery | Security Center</title>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark: #1a1a2e;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 { margin-bottom: 10px; font-weight: 700; }
        p { color: #ccc; font-size: 14px; margin-bottom: 30px; }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label { display: block; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        button:hover { background: #0056b3; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #444; cursor: not-allowed; }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .message.success { background: rgba(40, 167, 69, 0.2); color: #2ecc71; display: block; }
        .message.error { background: rgba(220, 53, 69, 0.2); color: #e74c3c; display: block; }

        .hidden { display: none; }

        .otp-input {
            letter-spacing: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="step1">
            <h2>Account Recovery</h2>
            <p>Locked out? Enter your email to receive a secure unlock code.</p>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@company.com">
            </div>
            
            <button id="btnRequest" onclick="requestOTP()">Send Unlock Code</button>
        </div>

        <div id="step2" class="hidden">
            <h2>Verify Identity</h2>
            <p>We've sent a 6-digit code to your email. Please enter it below.</p>
            
            <div class="form-group">
                <label>Verification Code</label>
                <input type="text" id="otp" maxlength="6" class="otp-input" placeholder="000000">
            </div>
            
            <button id="btnVerify" onclick="verifyOTP()">Unlock Account</button>
            <p style="margin-top: 15px;"><a href="#" onclick="location.reload()" style="color: var(--primary); text-decoration: none;">Back</a></p>
        </div>

        <div id="msg" class="message"></div>
    </div>

    <script>
        const GRAPHQL_URL = '/graphql';

        function showMessage(text, type) {
            const msg = document.getElementById('msg');
            msg.innerText = text;
            msg.className = `message ${type}`;
        }

        async function graphqlFetch(query, variables) {
            const response = await fetch(GRAPHQL_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables })
            });
            return response.json();
        }

        async function requestOTP() {
            const email = document.getElementById('email').value;
            const btn = document.getElementById('btnRequest');
            
            if (!email) return showMessage("Please enter your email", "error");

            btn.disabled = true;
            btn.innerText = "Sending...";

            const query = `
                mutation RequestOTP($email: String!) {
                    requestUnlockOtp(email: $email) {
                        statusCode
                        message
                    }
                }
            `;

            try {
                const res = await graphqlFetch(query, { email });
                const data = res.data.requestUnlockOtp;

                if (data.statusCode === 200) {
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    showMessage("Code sent! Check your inbox.", "success");
                } else {
                    showMessage(data.message, "error");
                }
            } catch (err) {
                showMessage("Server error. Try again.", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Send Unlock Code";
            }
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;
            const btn = document.getElementById('btnVerify');

            if (!otp || otp.length !== 6) return showMessage("Enter a valid 6-digit code", "error");

            btn.disabled = true;
            btn.innerText = "Verifying...";

            const query = `
                mutation VerifyOTP($email: String!, $otp: String!) {
                    verifyUnlockOtp(email: $email, otp: $otp) {
                        statusCode
                        message
                    }
                }
            `;

            try {
                const res = await graphqlFetch(query, { email, otp });
                const data = res.data.verifyUnlockOtp;

                if (data.statusCode === 200) {
                    showMessage("Account Unlocked! Redirecting to login...", "success");
                    setTimeout(() => {
                        alert("Your account is now unlocked. You can go to the login page.");
                    }, 2000);
                } else {
                    showMessage(data.message, "error");
                }
            } catch (err) {
                showMessage("Verification failed.", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Unlock Account";
            }
        }
    </script>
</body>
</html>
